name: Deploy jol3 to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: jol3-cpanel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
      FTP_PORT: ${{ secrets.CPANEL_FTP_PORT }}
      FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
      FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
      PUBLIC_DIR: ${{ secrets.CPANEL_PUBLIC_DIR || 'public_html' }}
      NEXT_PUBLIC_FAIV_TOKEN_ENDPOINT: ${{ secrets.NEXT_PUBLIC_FAIV_TOKEN_ENDPOINT || 'https://api.faiv.ai/api/faiv-embed-token' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          : "${FTP_HOST:?Missing CPANEL_FTP_HOST}"
          : "${FTP_PORT:?Missing CPANEL_FTP_PORT}"
          : "${FTP_USER:?Missing CPANEL_FTP_USER}"
          : "${FTP_PASSWORD:?Missing CPANEL_FTP_PASSWORD}"

      - name: Deploy out/ to cPanel public_html
        run: |
          set -euo pipefail
          lftp -e "
            set net:max-retries 2;
            set net:timeout 20;
            set ssl:verify-certificate no;
            set xfer:clobber yes;
            open -u $FTP_USER,$FTP_PASSWORD -p $FTP_PORT ftp://$FTP_HOST;
            mirror -R --delete --verbose=1 out $PUBLIC_DIR;
            bye
          "

